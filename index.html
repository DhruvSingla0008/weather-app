<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Beautiful weather app with real-time forecasts, dynamic animations, and 5-day predictions for any city worldwide." />
    <title>SkyPulse — Live Weather</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Animated Background Canvas -->
    <canvas id="weather-canvas"></canvas>

    <!-- Background Gradient Overlay -->
    <div id="bg-overlay" class="bg-overlay"></div>

    <div id="app" class="app-container">
      <!-- Header -->
      <header class="app-header">
        <div class="logo">
          <span class="logo-icon">🌤️</span>
          <h1 class="logo-text">SkyPulse</h1>
        </div>
        <div class="header-actions">
          <button id="unit-toggle" class="btn-unit" title="Toggle temperature unit">°C</button>
          <button id="geo-btn" class="btn-geo" title="Use my location">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search any city..." autocomplete="off" />
          <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading" class="loading hidden">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <span class="loading-text">Fetching weather data...</span>
        </div>
      </div>

      <!-- Error State -->
      <div id="error" class="error-card hidden">
        <span class="error-icon">⚠️</span>
        <p id="error-message" class="error-text"></p>
        <button id="error-dismiss" class="btn-dismiss">Dismiss</button>
      </div>

      <!-- Welcome State -->
      <div id="welcome" class="welcome-section">
        <div class="welcome-content">
          <div class="welcome-icon">🌍</div>
          <h2>Welcome to SkyPulse</h2>
          <p>Search for a city or use your location to get started</p>
        </div>
      </div>

      <!-- Main Weather Content -->
      <main id="weather-content" class="weather-content hidden">
        <!-- Current Weather Card -->
        <section class="current-weather-card" id="current-weather">
          <div class="current-top">
            <div class="current-location">
              <h2 id="city-name" class="city-name"></h2>
              <p id="weather-date" class="weather-date"></p>
            </div>
            <div class="current-icon-wrap">
              <img id="weather-icon" class="weather-icon-lg" src="" alt="weather icon" />
            </div>
          </div>
          <div class="current-middle">
            <div class="temp-display">
              <span id="current-temp" class="temp-value"></span>
              <span id="temp-unit" class="temp-unit">°C</span>
            </div>
            <p id="weather-desc" class="weather-description"></p>
            <p id="feels-like" class="feels-like"></p>
          </div>
          <div class="current-bottom">
            <div class="sun-times">
              <div class="sun-item">
                <span class="sun-icon">🌅</span>
                <div>
                  <span class="sun-label">Sunrise</span>
                  <span id="sunrise" class="sun-value"></span>
                </div>
              </div>
              <div class="sun-item">
                <span class="sun-icon">🌇</span>
                <div>
                  <span class="sun-label">Sunset</span>
                  <span id="sunset" class="sun-value"></span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Detail Grid -->
        <section class="detail-grid" id="detail-grid">
          <div class="detail-tile" id="detail-humidity">
            <div class="detail-icon">💧</div>
            <div class="detail-info">
              <span class="detail-label">Humidity</span>
              <span id="humidity" class="detail-value"></span>
            </div>
          </div>
          <div class="detail-tile" id="detail-wind">
            <div class="detail-icon">💨</div>
            <div class="detail-info">
              <span class="detail-label">Wind</span>
              <span id="wind" class="detail-value"></span>
            </div>
          </div>
          <div class="detail-tile" id="detail-pressure">
            <div class="detail-icon">🔵</div>
            <div class="detail-info">
              <span class="detail-label">Pressure</span>
              <span id="pressure" class="detail-value"></span>
            </div>
          </div>
          <div class="detail-tile" id="detail-visibility">
            <div class="detail-icon">👁️</div>
            <div class="detail-info">
              <span class="detail-label">Visibility</span>
              <span id="visibility" class="detail-value"></span>
            </div>
          </div>
        </section>

        <!-- 5 Day Forecast -->
        <section class="forecast-section" id="forecast-section">
          <h3 class="section-title">5-Day Forecast</h3>
          <div id="forecast-cards" class="forecast-cards"></div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="app-footer">
        <p>Powered by <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></p>
      </footer>
    </div>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
